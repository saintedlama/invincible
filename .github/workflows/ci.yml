name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test
        run: |
          gotestsum \
            --junitfile report.xml \
            --format testname \
            -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Test report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Go tests
          path: report.xml
          reporter: java-junit

      - name: Coverage summary
        if: success() || failure()
        run: |
          go tool cover -func coverage.out | awk '
            BEGIN { print "## Coverage\n\n| Package | Coverage |\n|---------|----------|" }
            /^total:/ { printf "| **%s** | **%s** |\n", $$1, $$NF; next }
            { printf "| %s | %s |\n", $$1, $$NF }
          ' >> $GITHUB_STEP_SUMMARY
