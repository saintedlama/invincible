name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: go build ./cmd/invincible/

      - name: Test
        shell: bash
        run: |
          gotestsum \
            --junitfile report.xml \
            --format testname \
            -- \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Go tests (${{ matrix.os }})
          path: report.xml
          reporter: java-junit

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest' && (success() || failure())
        run: |
          go tool cover -func coverage.out | \
            sed 's|github\.com/saintedlama/invincible/||' | \
            awk '
              BEGIN { print "## Coverage\n\n| Package | Coverage |\n|---------|----------|" }
              /^total:/ { printf "| **%s** | **%s** |\n", $1, $NF; next }
              { printf "| %s | %s |\n", $1, $NF }
            ' >> $GITHUB_STEP_SUMMARY
